<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Ninja - Game Display</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- p5.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.2/p5.min.js"></script>
  <!-- Socket.IO client library -->
  <script src="/socket.io/socket.io.js"></script>
  
  <style>
    :root {
      --bg-color: #08080c;
      --primary-neon: #00f2fe; /* Cyan */
      --secondary-neon: #4facfe; /* Blue */
      --accent-neon: #ff007f; /* Neon pink */
      --success-neon: #39ff14; /* Neon green */
      --warning-neon: #ffb703; /* Yellow */
      --glass-bg: rgba(16, 16, 24, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8f9fa;
      --text-muted: #8e9297;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Cyber-grid background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 242, 254, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 254, 0.02) 1px, transparent 1px);
      background-size: 45px 45px;
      background-position: center center;
      z-index: -1;
      pointer-events: none;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Glassmorphism overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: rgba(4, 4, 6, 0.85);
      backdrop-filter: blur(10px);
      transition: opacity 0.5s ease, visibility 0.5s ease;
      overflow-y: auto;
      padding: 40px 15px;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .modal {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                  0 0 40px rgba(0, 242, 254, 0.15);
      text-align: center;
      position: relative;
      margin: auto;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, var(--primary-neon), var(--accent-neon));
      border-radius: 26px;
      z-index: -1;
      opacity: 0.2;
    }

    h1.title {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 30%, var(--primary-neon) 70%, var(--accent-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 20px;
      width: 100%;
      text-align: left;
    }
    
    .form-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }
    
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 20px;
      font-family: inherit;
      font-size: 1.2rem;
      color: var(--text-main);
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
    }
    
    .form-input:focus {
      border-color: var(--primary-neon);
      background: rgba(0, 242, 254, 0.05);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
    }

    .start-game-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
      border: none;
      border-radius: 12px;
      padding: 14px 40px;
      color: #000;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
      transition: all 0.3s ease;
      width: 100%;
    }

    .start-game-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
    }

    .start-game-btn:active {
      transform: translateY(1px);
    }

    /* On-Screen HUD Overlay (drawn on top of Canvas for maximum sharpness) */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #hud.visible {
      opacity: 1;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-score-area {
      display: flex;
      flex-direction: column;
      background: rgba(8, 8, 12, 0.65) !important;
      padding: 12px 24px !important;
      border-radius: 16px !important;
      backdrop-filter: blur(10px) !important;
    }

    #hud-p1 {
      border: 1px solid rgba(0, 242, 254, 0.25) !important;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.08) !important;
    }

    #hud-p2 {
      border: 1px solid rgba(255, 0, 127, 0.25) !important;
      box-shadow: 0 0 20px rgba(255, 0, 127, 0.08) !important;
    }

    .hud-label {
      font-size: 3.5rem !important;
      font-weight: 900 !important;
      color: #ffffff !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
    }

    .hud-value {
      font-size: 3.5rem !important;
      font-weight: 800 !important;
      color: #ffffff !important;
      line-height: 1.1 !important;
    }

    #hud-p1-label, #score-p1-val {
      text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe, 0 0 30px rgba(0, 242, 254, 0.5) !important;
    }

    #hud-p2-label, #score-p2-val {
      text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 30px rgba(255, 0, 127, 0.5) !important;
    }

    .hud-combo {
      font-size: 1.5rem;
      color: var(--accent-neon);
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
      margin-top: 5px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hud-combo.active {
      opacity: 1;
      transform: scale(1);
    }

    .hud-right-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Time display for Zen mode */
    .hud-timer {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary-neon);
      text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    /* Game Over Modal */
    .gameover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 6, 0.9);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      overflow-y: auto;
      padding: 40px 15px;
    }

    .gameover-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    canvas {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #canvas-container {
      touch-action: none;
    }

    /* Portrait / Kiosk Responsiveness */
    @media (max-aspect-ratio: 1/1) {
      .modal {
        width: 92% !important;
        max-width: 440px !important;
        padding: 20px 15px !important;
        border-radius: 16px !important;
      }
      h1.title {
        font-size: 2.2rem !important;
        letter-spacing: 1px !important;
      }
      p.subtitle {
        margin-bottom: 15px !important;
        font-size: 0.95rem !important;
      }
      #gameover-announcement {
        font-size: 1.4rem !important;
        margin-bottom: 15px !important;
      }
      #gameover-single-score {
        padding: 10px !important;
        margin: 15px 0 !important;
      }
      .gameover-score-value {
        font-size: 2.0rem !important;
      }
      .start-game-btn {
        padding: 10px 15px !important;
        font-size: 0.95rem !important;
      }

      /* HUD adjustments for portrait */
      #hud {
        padding: 15px !important;
      }
      .hud-top {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
        align-items: center !important;
      }
      .hud-score-area {
        padding: 8px 16px !important;
        text-align: center !important;
      }
      #hud-p1 {
        justify-self: start !important;
      }
      .hud-right-panel {
        justify-self: end !important;
      }
      .hud-timer {
        font-size: 2.0rem !important;
      }
      #hud .hud-label {
        font-size: 1.3rem !important;
      }
      #hud .hud-value {
        font-size: 1.5rem !important;
      }
    }
  </style>
</head>
<body>

  <!-- Canvas container for p5.js -->
  <div id="canvas-container"></div>

  <!-- Waiting Message when game hasn't started -->
  <div id="game-waiting-message" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.05); z-index: 10; text-align: center; width: 80%;">
    Waiting for player to start
  </div>

  <!-- HUD overlay -->
  <div id="hud">
    <div class="hud-top" style="width: 100%; display: grid; grid-template-columns: 1fr 140px 1fr; align-items: start;">
      <!-- P1 scorecard (left side) -->
      <div id="hud-p1" class="hud-score-area" style="text-align: left; background: rgba(8, 8, 12, 0.65); border: 1px solid rgba(0, 242, 254, 0.25); padding: 12px 24px; border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0, 242, 254, 0.08);">
        <div style="display: flex; align-items: baseline; gap: 20px;">
          <span class="hud-label" id="hud-p1-label" style="color: #fff; font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; text-transform: uppercase;">Player 1</span>
          <span id="score-p1-val" class="hud-value" style="color: #fff; text-shadow: 0 0 15px rgba(0, 242, 254, 0.8); font-size: 3.5rem; line-height: 1.1;">000</span>
        </div>
        <span id="combo-p1-val" class="hud-combo" style="color: var(--primary-neon);">3-FRUIT COMBO!</span>
      </div>

      <!-- Center Area: Zen Timer -->
      <div class="hud-right-panel" style="align-items: center; justify-self: center;">
        <div id="timer-val" class="hud-timer">60s</div>
      </div>

      <!-- P2 scorecard (right side) -->
      <div id="hud-p2" class="hud-score-area" style="text-align: right; display: none; background: rgba(8, 8, 12, 0.65); border: 1px solid rgba(255, 0, 127, 0.25); padding: 12px 24px; border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(255, 0, 127, 0.08);">
        <div style="display: flex; align-items: baseline; gap: 20px; justify-content: flex-end;">
          <span id="score-p2-val" class="hud-value" style="color: #fff; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8); font-size: 3.5rem; line-height: 1.1;">000</span>
          <span class="hud-label" id="hud-p2-label" style="color: #fff; font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; text-transform: uppercase;">Player 2</span>
        </div>
        <span id="combo-p2-val" class="hud-combo" style="color: var(--accent-neon);">3-FRUIT COMBO!</span>
      </div>
    </div>
  </div>



  <!-- Game Over Screen -->
  <div id="gameover-overlay" class="gameover-overlay">
    <div class="modal" style="max-width: 550px;">
      <h1 class="title" id="gameover-title" style="background: linear-gradient(135deg, #ff0055, var(--accent-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Game Over</h1>
      <p class="subtitle" id="gameover-mode-info">1-Minute Game</p>

      <p id="gameover-announcement" style="font-size: 1.8rem; font-weight: 800; color: #fff; text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); margin-bottom: 20px; display: none;">Alice Wins!</p>

      <!-- Single Player Scoreboard -->
      <div id="gameover-single-score" style="margin: 30px 0; display: flex; justify-content: space-around; background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border);">
        <div>
          <div class="hud-label">Final Score</div>
          <div class="hud-value" id="gameover-score" style="color: var(--primary-neon); font-size: 4rem;">0</div>
        </div>
        <div>
          <div class="hud-label">Best Combo</div>
          <div class="hud-value" id="gameover-combo" style="color: var(--accent-neon); font-size: 4rem;">0</div>
        </div>
      </div>

      <!-- 2 Player Scoreboard -->
      <div id="gameover-double-score" style="margin: 30px 0; display: none; flex-direction: column; gap: 12px; background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); text-align: left;">
        <div style="display: grid; grid-template-columns: 2fr 1fr 1.5fr; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: var(--text-muted);">
          <span>Player</span>
          <span style="text-align: center;">Score</span>
          <span style="text-align: center;">Status</span>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1.5fr; font-size: 1.2rem; font-weight: 600; align-items: center;">
          <span id="p1-go-name" style="color: var(--primary-neon);">Player 1</span>
          <span id="p1-go-score" style="text-align: center;">0</span>
          <span id="p1-go-status" style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">PLAYED</span>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1.5fr; font-size: 1.2rem; font-weight: 600; align-items: center;">
          <span id="p2-go-name" style="color: var(--accent-neon);">Player 2</span>
          <span id="p2-go-score" style="text-align: center;">0</span>
          <span id="p2-go-status" style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">PLAYED</span>
        </div>
      </div>

      <div style="display: flex; gap: 15px; justify-content: center;">
        <button class="start-game-btn" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: #fff; margin-top: 0;" onclick="showMenu()">Go Back to Home</button>
        <button class="start-game-btn" style="margin-top: 0;" onclick="triggerPlayAgain()">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Game main logic -->
  <script src="/game.js"></script>
</body>
</html>
